async function secureLogin(userKey,pin){
  const email=AUTH_EMAILS[userKey];
  if(!email)return{ok:false,err:"NO_EMAIL"};
  try{
    if(auth.currentUser&&auth.currentUser.email===email)return{ok:true};
    if(auth.currentUser&&auth.currentUser.email!==email){try{await signOut(auth);}catch(e){}}
    await signInWithEmailAndPassword(auth,email,pin+AUTH_PASS_SUFFIX);
    return{ok:true};
  }catch(e){
    return{ok:false,err:(e&&e.code)||String(e)};
  }
}

// بصمة محلية مشفّرة (SHA-256) تسمح بالدخول بدون إنترنت بعد أول دخول ناجح
async function pinHash(userKey,pin){
  const enc=new TextEncoder().encode("qama|"+userKey+"|"+pin+"|v1");
  const buf=await crypto.subtle.digest("SHA-256",enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function canEdit(){
  if(!S.user)return false;
  if(USERS[S.user].role==="owner")return true;
  if(isMonthLocked(S.year,S.month))return false;
  const perms=S.permissions[S.user];

  if(S.user==="yahia"){
    const diffMonths=(S.year*12+S.month)-(NOW_Y*12+NOW_M);
    return diffMonths>=-1 && diffMonths<=1;
  }
  return S.month===NOW_M && S.year===NOW_Y;
}

function saveLocks(){

  // Firebase يُقرأ فقط مرة واحدة عند الدخول (login) عبر loadLocksFromServer
  try{const l=localStorage.getItem("qama_locks");if(l)S.lockedMonths=JSON.parse(l);}catch(e){}

// تُستدعى عند الدخول وعند ضغط تحديث لجلب القيم من Firebase مباشرة
async function loadLocksFromServer(){
  try{
    // استخدم getDoc من module-level imports — بدون dynamic import
    const snap=await getDoc(doc(db,"config","locks"));
    if(snap.exists()){
      const d=snap.data();

      S.lockedMonths={};
      try{localStorage.setItem("qama_locks","{}");} catch(e){}
    }
  }catch(e){
    console.error("loadLocksFromServer error:",e);
  }
}
function isMonthLocked(y,m){return !!(S.lockedMonths&&S.lockedMonths[getMonthKey(y,m)]);}

// ===== REQUEST SYSTEM =====
async function submitRequest(type, desc, payload){
  if(!S.user)return;
  // منع الضغط المزدوج على الزر
  if(S.submitting){showMsg("⏳ جاري الإرسال...");return;}
  if(USERS[S.user]?.role!=="owner" && isMonthLocked(S.year,S.month)){
    showMsg("🔒 الشهر مقفل — لا يمكن إرسال طلبات");return;
  }
  // منع تكرار الطلبات المعلقة
  const dupe=S.pendingRequests.find(r=>r.status==="pending"&&r.by===S.user&&r.type===type&&(
    (type==="update_partition"&&r.payload?.partId===payload?.partId&&r.payload?.unitId===payload?.unitId)||
    (type==="update_full"&&r.payload?.unitId===payload?.unitId)||
    // منع تكرار طلبات الإيداع بنفس المبلغ والتاريخ والوصف
    (type==="add_transaction"&&
      r.payload?.transaction?.amount===payload?.transaction?.amount&&
      r.payload?.transaction?.date===payload?.transaction?.date&&
      (r.payload?.transaction?.desc||r.desc)===(payload?.transaction?.desc||desc))
  ));
  if(dupe){showMsg("⏳ لديك طلب معلق بنفس البيانات بالفعل");return;}
  S.submitting=true; R(); // تعطيل الزر فوراً
  const req={
    id:"req_"+Date.now(),
    type, desc, payload,
    by:S.user,
    byName:USERS[S.user].name,
    month:S.month, year:S.year,
    status:"pending",
    createdAt:new Date().toISOString()
  };
  try{
    await setDoc(doc(db,"requests",req.id),req);
    showMsg("✓ تم إرسال الطلب لاعتماد المدير");
  }catch(e){
    showMsg("⚠ تعذر إرسال الطلب");
  }finally{
    S.submitting=false;
  }
  await loadRequests();
}

async function loadRequests(){
  try{
    const {getDocs,collection,query,orderBy}=await import("https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js");
    const q=query(collection(db,"requests"),orderBy("createdAt","desc"));
    const snap=await getDocs(q);
    S.pendingRequests=snap.docs.map(d=>d.data());
    S.notifCount=S.pendingRequests.filter(r=>r.status==="pending").length;
    R();
  }catch(e){console.error(e);}
}

async function approveRequest(req){
  // FIX 4: منع الضغط المزدوج من نفس الجهاز
  if(S.approvingReqId){showMsg("⏳ جاري اعتماد طلب آخر...");return;}
  S.approvingReqId=req.id; R();
  try{
    // ============================================================
    // حماية atomic من التكرار باستخدام Firebase runTransaction
    // runTransaction يضمن: اقرأ الطلب + تحقق status + اكتب processing
    // كل ذلك في عملية واحدة لا تقبل التنفيذ المتزامن من جهازين
    // ============================================================
    const {doc:fbDoc,getDoc:fbGetDoc,setDoc:fbSetDoc,serverTimestamp:fbSTS,runTransaction:fbRunTx}=
      await import("https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js");
    const reqRef=fbDoc(db,"requests",req.id);
    let reqLive=null;
    try{
      await fbRunTx(db,async(tx)=>{
        const snap=await tx.get(reqRef);
        if(!snap.exists()) throw new Error("NOT_FOUND");
        const d=snap.data();
        if(d.status!=="pending") throw new Error("NOT_PENDING:"+d.status);
        // اكتب processing داخل نفس الـ transaction — atomic
        tx.update(reqRef,{status:"processing",processingAt:new Date().toISOString()});
        reqLive=d;
      });
    }catch(txErr){
      const msg=txErr.message||"";
      if(msg==="NOT_FOUND"){showMsg("⚠ الطلب غير موجود");return;}
      if(msg.startsWith("NOT_PENDING")){
        const st=msg.split(":")[1]||"";
        showMsg(st==="approved"?"✓ الطلب مُعتمد مسبقاً":"⏳ الطلب قيد المعالجة أو مرفوض");
        await loadRequests();R();return;
      }
      throw txErr; // خطأ غير متوقع
    }
    // بعد runTransaction نستخدم reqLive (النسخة الحقيقية من Firebase) وليس req (نسخة الواجهة)
    const R_=reqLive; // اختصار واضح — R_ هي المصدر الموثوق
    const data=getMonthData(R_.year,R_.month);
    if(R_.type==="update_partition"){
      const unit=data.units.find(u=>u.id===R_.payload.unitId);
      if(unit){const p=unit.partitions.find(p=>p.id===R_.payload.partId);if(p)Object.assign(p,R_.payload.fields);}
    } else if(R_.type==="update_full"){
      const u=data.full.find(u=>u.id===R_.payload.unitId);
      if(u)Object.assign(u,R_.payload.fields);
    } else if(R_.type==="add_expense"){
      data.expenses.push(R_.payload.expense);
      S.revenueBalance=Math.max(0,Math.round((S.revenueBalance-Number(R_.payload.expense.amount||0))*100)/100);
      try{setDoc(doc(db,"config","balances"),{companyBalance:S.companyBalance,revenueBalance:S.revenueBalance,installmentBalance:S.installmentBalance,installmentSchedule:S.installmentSchedule,updatedAt:serverTimestamp()},{merge:true});}catch(e){}
    } else if(R_.type==="add_transaction"){
      // FIX 2: نستخدم reqLive.payload وليس req.payload
      const tx=R_.payload.transaction;
      const reqId=R_.id;
      // حماية idempotency: requestId أو نفس البيانات
      const alreadyIn=data.transactions.find(t=>
        t.requestId===reqId ||
        (t.amount===tx.amount && t.date===tx.date && t.desc===tx.desc && t.by===tx.by)
      );
      if(alreadyIn){
        showMsg("⚠ هذا الإيداع موجود بالفعل — تم تجاهل التكرار");
        await fbSetDoc(fbDoc(db,"requests",R_.id),{...R_,status:"approved",approvedAt:new Date().toISOString()},{merge:true});
        await loadRequests();R();return;
      }
      data.transactions.push({...tx,requestId:reqId});
      S.revenueBalance=Math.round((S.revenueBalance+Number(tx.amount||0))*100)/100;
      try{await setDoc(doc(db,"config","balances"),{companyBalance:S.companyBalance,revenueBalance:S.revenueBalance,installmentBalance:S.installmentBalance,installmentSchedule:S.installmentSchedule,updatedAt:serverTimestamp()},{merge:true});await loadBalances().then(()=>R());}catch(e){}
    } else if(R_.type==="add_unit"){
      data.units.push(R_.payload.unit);
      registerCustomUnit(R_.payload.unit,false,R_.year,R_.month);
      propagateNewUnit(R_.payload.unit,R_.year,R_.month);
    } else if(R_.type==="add_full_unit"){
      data.full.push(R_.payload.unit);
      registerCustomUnit(R_.payload.unit,true,R_.year,R_.month);
      propagateNewFullUnit(R_.payload.unit,R_.year,R_.month);
    } else if(R_.type==="delete_partition"){
      const unit=data.units.find(u=>u.id===R_.payload.unitId);
      if(unit){const pi=unit.partitions.findIndex(p=>p.id===R_.payload.partId);if(pi>-1)unit.partitions.splice(pi,1);}
    } else if(R_.type==="delete_full"){
      const fi=data.full.findIndex(u=>u.id===R_.payload.unitId);
      if(fi>-1)data.full.splice(fi,1);
      try{removeCustomUnit(R_.payload.unitId,true,R_.year,R_.month);}catch(e){}
      try{propagateRemoveUnit(R_.payload.unitId,true,R_.year,R_.month);}catch(e){}
    }
    if(R_.type==="add_daily"){
      if(!data.dailyBookings)data.dailyBookings=[];
      data.dailyBookings.push({...R_.payload.booking,id:R_.id});
    } else if(R_.type==="add_unit_maintenance"){
      if(!data.unitMaintenance)data.unitMaintenance=[];
      data.unitMaintenance.push({...R_.payload.maintenance,id:R_.id});
      if(Number(R_.payload.maintenance.amount||0)>0){
        S.revenueBalance=Math.max(0,Math.round((S.revenueBalance-Number(R_.payload.maintenance.amount))*100)/100);
        try{setDoc(doc(db,"config","balances"),{companyBalance:S.companyBalance,revenueBalance:S.revenueBalance,installmentBalance:S.installmentBalance,installmentSchedule:S.installmentSchedule,updatedAt:serverTimestamp()},{merge:true});}catch(e){}
      }
    } else if(R_.type==="add_facility_maintenance"){
      if(!data.facilityMaintenance)data.facilityMaintenance=[];
      data.facilityMaintenance.push({...R_.payload.maintenance,id:R_.id});
      if(Number(R_.payload.maintenance.amount||0)>0){
        S.revenueBalance=Math.max(0,Math.round((S.revenueBalance-Number(R_.payload.maintenance.amount))*100)/100);
        try{setDoc(doc(db,"config","balances"),{companyBalance:S.companyBalance,revenueBalance:S.revenueBalance,installmentBalance:S.installmentBalance,installmentSchedule:S.installmentSchedule,updatedAt:serverTimestamp()},{merge:true});}catch(e){}
      }
    }
    // Audit Log
    try{
      const RTL={update_partition:"تعديل بارتشن",update_full:"تعديل شقة",add_transaction:"إيداع",add_expense:"مصروف",add_unit_maintenance:"صيانة شقة",add_facility_maintenance:"صيانة مرافق",add_daily:"حجز يومي",delete_partition:"حذف بارتشن",delete_full:"حذف شقة"};
      addLog&&addLog(data,(USERS[S.user]?.name||S.user)+" اعتمد طلب "+(RTL[R_.type]||R_.type)+" من "+(USERS[R_.by]?.name||R_.by||"موظف"),{target:R_.desc||(RTL[R_.type]||R_.type),field:"اعتماد",oldVal:"معلّق",newVal:"معتمد"});
    }catch(e){}
    // كتابة واحدة لـ Firebase للشهر
    const monthKey=getMonthKey(R_.year,R_.month);
    const finalData=normalizeData(data);
    try{localStorage.setItem("qama_month_"+monthKey,JSON.stringify(finalData));}catch(e){}
    await fbSetDoc(fbDoc(db,"months",monthKey),{data:finalData,updatedAt:fbSTS()},{merge:true});
    // approved — يحوّل status من processing إلى approved
    await fbSetDoc(fbDoc(db,"requests",R_.id),{...R_,status:"approved",approvedAt:new Date().toISOString()});
    showMsg("✓ تم اعتماد الطلب");
    await loadRequests();
    await loadMonthOnline(R_.year,R_.month);
    if(R_.year!==S.year||R_.month!==S.month) await loadMonthOnline(S.year,S.month);
    await loadBalances();
    R();
  }catch(e){
    showMsg("⚠ خطأ في الاعتماد — راجع السجل");
    console.error(e);
  }finally{
    // FIX 4: نُعيد تفعيل الزر دائماً سواء نجح أو فشل
    S.approvingReqId=null; R();
  }
}

async function rejectRequest(req){
  try{
    await setDoc(doc(db,"requests",req.id),{...req,status:"rejected",rejectedAt:new Date().toISOString()});
    showMsg("✓ تم رفض الطلب");
    await loadRequests();
  }catch(e){showMsg("⚠ خطأ");}
}

function propagateNewUnit(unit, fromYear, fromMonth){
  // Add unit to all future months that exist in localStorage
  let m=fromMonth+1, y=fromYear;
  for(let i=0;i<12;i++){
    if(m>11){m=0;y++;}
    const k=getMonthKey(y,m);
    const existing=localStorage.getItem("qama_month_"+k);
    if(existing){
      try{
        const d=JSON.parse(existing);
        if(!d.units.find(u=>u.id===unit.id)){
          const freshUnit=JSON.parse(JSON.stringify(unit));
          freshUnit.partitions=freshUnit.partitions.map(p=>({...p,status:"vacant",tenant:"",note:"فارغ",partial:false,paid_amount:0}));
          d.units.push(freshUnit);
          localStorage.setItem("qama_month_"+k,JSON.stringify(d));
        }
      }catch(e){}
    }
    m++;
  }
}

function propagateRemoveUnit(unitId, isFull, fromYear, fromMonth){
  // Remove from current + future months that exist in localStorage
  let m=fromMonth, y=fromYear;
  for(let i=0;i<13;i++){
    const k=getMonthKey(y,m);
    const existing=localStorage.getItem("qama_month_"+k);
    if(existing){
      try{
        const d=JSON.parse(existing);
        if(isFull){
          const ix=d.full.findIndex(u=>u.id===unitId);
          if(ix>-1)d.full.splice(ix,1);
        } else {
          const ix=d.units.findIndex(u=>u.id===unitId);
          if(ix>-1)d.units.splice(ix,1);
        }
        localStorage.setItem("qama_month_"+k,JSON.stringify(d));
      }catch(e){}
    }
    m++;if(m>11){m=0;y++;}
  }
}

function propagateNewFullUnit(unit, fromYear, fromMonth){
  let m=fromMonth+1, y=fromYear;
  for(let i=0;i<12;i++){
    if(m>11){m=0;y++;}
    const k=getMonthKey(y,m);
    const existing=localStorage.getItem("qama_month_"+k);
    if(existing){
      try{
        const d=JSON.parse(existing);
        if(!d.full.find(u=>u.id===unit.id)){
          d.full.push(initFull({...unit}));
          localStorage.setItem("qama_month_"+k,JSON.stringify(d));
        }
      }catch(e){}
    }
    m++;
  }
}

async function loadBalances(){

    const {getDocFromServer}=await import("https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js");
    const snap=await getDocFromServer(doc(db,"config","balances")).catch(()=>getDoc(doc(db,"config","balances")));
    if(snap.exists()){
      const d=snap.data();
      if(d.companyBalance!=null&&!S.showEditCompany)S.companyBalance=d.companyBalance;
      if(d.revenueBalance!=null&&!S.showEditRevenue)S.revenueBalance=d.revenueBalance;
      if(d.installmentBalance!=null)S.installmentBalance=d.installmentBalance;
      if(d.installmentSchedule!=null)S.installmentSchedule=d.installmentSchedule;
      R();
    }
  }catch(e){}
}

function loadPermissions(){
  try{
    const p=localStorage.getItem("qama_permissions");
    if(p)S.permissions=JSON.parse(p);
  }catch(e){}
  // Also fetch from Firebase to get latest permissions set by owner
  try{
    getDoc(doc(db,"config","permissions")).then(snap=>{
      if(snap.exists()){
        const data=snap.data().data||snap.data();
        if(data&&typeof data==="object"){
          S.permissions=data;
          localStorage.setItem("qama_permissions",JSON.stringify(data));
          R();
        }
      }
    }).catch(()=>{});
  }catch(e){}
}

function isAprilMonth(y,m){ return Number(y)===2026 && Number(m)===3; }
function isBeforeFirstMonth(y,m){ return Number(y)<2026 || (Number(y)===2026 && Number(m)<3); }
function applyAprilImportedRevenue(data, preserveExisting=false){
  data=normalizeData(data||createZeroMonthData());
  const importedIds=new Set(APRIL_IMPORTED_TRANSACTIONS.map(t=>t.id));
  const existing = preserveExisting ? (data.transactions||[]).filter(t=>!importedIds.has(t.id)) : [];
  data.transactions=[...JSON.parse(JSON.stringify(APRIL_IMPORTED_TRANSACTIONS)), ...existing];
  data.expenses=preserveExisting ? (data.expenses||[]) : [];
  data.profits=preserveExisting ? (data.profits||[]) : [];
  data.installments=preserveExisting ? (data.installments||[]) : [];
  data.units=data.units||[];
  APRIL_PARTITION_UPDATES.forEach(u=>{
    const unit=data.units.find(x=>String(x.id)===String(u.unitId));
    const p=unit && (unit.partitions||[]).find(x=>Number(x.id)===Number(u.partId));
    if(p){
      if(u.rent!==null && u.rent!==undefined)p.rent=u.rent;
      p.status=u.status; p.note=u.note||""; p.paid_amount=u.paid_amount||0; p.partial=!!u.partial;
    }
  });
  data.full=data.full||[];
  APRIL_FULL_UPDATES.forEach(u=>{
    const f=data.full.find(x=>String(x.id)===String(u.id));
    if(f){
      if(u.rent!==null && u.rent!==undefined)f.rent=u.rent;
      f.status=u.status; f.paid_amount=u.paid_amount||0; f.partial=!!u.partial; f.note=u.note||"";
    }
  });
  data.aprilSeedVersion="april-revenue-numbers-v1";
  data.monthInitMode="april-import-v1";
  data.logs=data.logs||[];
  if(!data.logs.some(l=>String(l.id)==="april-import-log")){
    data.logs.unshift({id:"april-import-log",user:"saeed",name:"مدير",text:"تم تحميل إيرادات شهر أبريل من ملف Numbers: 167,857 د.إ",at:new Date().toISOString()});
  }
  return data;
}

function paidValue(x){
  const rent=Number(x?.rent||0), paid=Number(x?.paid_amount||0);
  if(x?.status==="staff"||x?.status==="vacant")return 0;
  if(x?.partial)return Math.max(0,Math.min(paid,rent||paid));
  if(x?.status==="collected")return paid>0?paid:rent;
  return 0;
}
function remainingValue(x){return Math.max(0,Number(x?.rent||0)-paidValue(x));}
function isPartialPaid(x){return !!x?.partial && (Number(x?.rent||0)>0 || Number(x?.paid_amount||0)>0) && remainingValue(x)>0;}
function moneyText(n){return Number(n||0).toLocaleString();}
function todayISO(){return new Date().toISOString().slice(0,10);}
function addMonthsISO(dateStr, months=1){
  if(!dateStr)return "";
  const d=new Date(dateStr+"T00:00:00");
  if(isNaN(d))return "";
  const day=d.getDate();
  d.setMonth(d.getMonth()+months);
  if(d.getDate()<day)d.setDate(0);
  return d.toISOString().slice(0,10);
}
function isDatePast(dateStr){
  if(!dateStr)return false;
  return dateStr < todayISO();
}
function rentType(x){
  return x?.rent_type || x?.rentType || (x?.note==="يومي" ? "daily" : "monthly");
}
function rentTypeText(x){return rentType(x)==="daily"?"يومي":"شهري";}
function dueDateOf(x){
  if(rentType(x)==="daily")return x?.end_date || "";
  return x?.due_date || (x?.start_date ? addMonthsISO(x.start_date,1) : "");
}
function dateInfoText(x){
  if(rentType(x)==="daily"){
    if(x?.start_date||x?.end_date)return "يومي: "+(x.start_date||"—")+" إلى "+(x.end_date||"—");
    return "إيجار يومي";
  }
  const due=dueDateOf(x);
  if(x?.start_date||due)return "شهري: من "+(x.start_date||"—")+" · الاستحقاق "+(due||"—");
  return "إيجار شهري";
}

function calculateDueDate(startDate){
  // If no start_date, return null
  if(!startDate) return null;
  const sd = new Date(startDate);
  const day = sd.getDate();
  const now = new Date();
  let dueDate = new Date(now.getFullYear(), now.getMonth(), day);
  // If this month's due date already passed, next month is the due date
  if(dueDate < now) dueDate = new Date(now.getFullYear(), now.getMonth()+1, day);
  return dueDate.toISOString().slice(0,10);
}

function displayStatus(x){
  const st=x?.status || "late";
  if(isPartialPaid(x))return "partial";
  if(st==="collected"||st==="vacant"||st==="staff")return st;
  if(st==="late")return "late";
  const due=dueDateOf(x);
  if(due && !isDatePast(due))return "pending";
  return "late";
}

function registerCustomUnit(unit,isFull,fromYear,fromMonth){
  const cu=getCustomUnits();
  const entry={...unit,_fromY:fromYear,_fromM:fromMonth,_removedY:null,_removedM:null};
  if(isFull){
    if(!cu.full.find(u=>u.id===unit.id))cu.full.push(entry);

  try{localStorage.setItem("qama_custom_units",JSON.stringify(cu));}catch(e){}

// Mark a custom unit as removed from a specific month onwards
function removeCustomUnit(unitId,isFull,fromYear,fromMonth){
  const cu=getCustomUnits();
  const list=isFull?cu.full:cu.units;
  const entry=list.find(u=>u.id===unitId);
  if(entry){
    entry._removedY=fromYear;
    entry._removedM=fromMonth;
    try{localStorage.setItem("qama_custom_units",JSON.stringify(cu));}catch(e){}
    try{setDoc(doc(db,"config","customUnits"),{data:cu,updatedAt:serverTimestamp()},{merge:true});}catch(e){}
  }
}

// Check if a custom unit should appear in a given month
function customUnitActiveIn(entry,y,m){
  const monthVal=y*12+m;
  const fromVal=(entry._fromY!=null)?entry._fromY*12+entry._fromM:0;
  if(monthVal<fromVal)return false; // before it was added
  if(entry._removedY!=null){
    const remVal=entry._removedY*12+entry._removedM;
    if(monthVal>=remVal)return false; // removed from this month onwards
  }
  return true;
}

async function copyRentsFromPrevMonth(y,m){
  let py=y, pm=m-1;
  if(pm<1){pm=12;py=y-1;}
  const pk=getMonthKey(py,pm);
  try{

    if(!snap.exists()){showMsg('❌ الشهر السابق غير موجود');return;}
    const prev=normalizeData(snap.data().data||snap.data());
    if(!prev||!prev.units){showMsg('❌ لا بيانات في الشهر السابق');return;}
    const cur=getCurData();
    cur.units.forEach(nu=>{
      const pu=prev.units.find(x=>x.id===nu.id);
      if(!pu)return;
      nu.partitions.forEach(np=>{
        const pp=pu.partitions.find(x=>x.id===np.id);
        if(pp&&pp.rent!==undefined)np.rent=pp.rent;
      });
    });
    cur.full.forEach(nf=>{
      const pf=prev.full.find(x=>x.id===nf.id);
      if(pf&&pf.rent!==undefined)nf.rent=pf.rent;
    });
    saveCurData(cur);

}

function createZeroMonthData(y,m){
  const data = {
    monthInitMode:"zero-v2",
    units: JSON.parse(JSON.stringify(BASE_UNITS)).map(u=>({
      ...u,
      partitions:u.partitions.map(p=>({
        ...p,
        status: initialPartitionStatus(p),
        tenant:p.tenant||"",
        note:initialPartitionNote(p),
        rent_type:(p.note==="يومي"?"daily":"monthly"),
        start_date:"",
        end_date:"",
        due_date:"",
        partial:false,
        paid_amount:0
      }))
    })),
    full: JSON.parse(JSON.stringify(BASE_FULL)).map(u=>initFull(u)),
    expenses:[],
    transactions:[],
    profits:[],
    installments:[],
    logs:[]
  };
  // Merge custom units (only in months >= when added, and before removal)
  const cu=getCustomUnits();
  cu.units.forEach(u=>{
    if(customUnitActiveIn(u,y,m) && !data.units.find(x=>x.id===u.id)){
      const fresh=JSON.parse(JSON.stringify(u));
      delete fresh._fromY;delete fresh._fromM;delete fresh._removedY;delete fresh._removedM;
      fresh.partitions=fresh.partitions.map(p=>({...p,status:"vacant",tenant:"",note:"فارغ",partial:false,paid_amount:0,start_date:"",end_date:"",due_date:""}));
      data.units.push(fresh);
    }
  });
  cu.full.forEach(u=>{
    if(customUnitActiveIn(u,y,m) && !data.full.find(x=>x.id===u.id)){
      const clean={...u};
      delete clean._fromY;delete clean._fromM;delete clean._removedY;delete clean._removedM;
      data.full.push(initFull(clean));
    }
  });
  if(isAprilMonth(y,m))return applyAprilImportedRevenue(data,false);
  return data;
}

function isOldAutoFilledMonth(data){
  if(!data || data.monthInitMode==="zero-v2")return false;
  const hasOps=(data.expenses&&data.expenses.length)||(data.transactions&&data.transactions.length)||(data.profits&&data.profits.length)||(data.installments&&data.installments.length)||(data.logs&&data.logs.length);
  if(hasOps)return false;
  const parts=(data.units||[]).flatMap(u=>u.partitions||[]);
  const full=data.full||[];
  const collectedParts=parts.filter(p=>p.status==="collected").length;
  const collectedFull=full.filter(u=>u.status==="collected").length;
  const vacantParts=parts.filter(p=>p.status==="vacant").length;
  // أي شهر قديم تم إنشاؤه آلياً قبل قاعدة "لا شواغر إلا بتعديل"، نعيد إنشاءه من الصفر
  return collectedParts+collectedFull+vacantParts>0 || data.monthInitMode!=="zero-v2";
}

function normalizeData(data){
  data.units=data.units||[];
  data.units.forEach(u=>{
    u.partitions=(u.partitions||[]).map(p=>{
      if(!p.rent_type)p.rent_type=rentType(p);
      if(p.start_date===undefined)p.start_date="";
      if(p.end_date===undefined)p.end_date="";
      if(p.due_date===undefined)p.due_date=p.start_date?addMonthsISO(p.start_date,1):"";
      return p;
    });
  });
  data.full=(data.full||[]).map(f=>{
    if(f.start_date===undefined)f.start_date="";
    if(f.due_date===undefined)f.due_date=f.start_date?addMonthsISO(f.start_date,1):"";
    return f;
  });
  data.expenses=data.expenses||[];
  data.transactions=data.transactions||[];
  data.profits=data.profits||[];
  data.installments=data.installments||[];
  data.logs=data.logs||[];
  return data;
}

function timeAgo(iso){
  try{
    const d=new Date(iso), diff=Math.floor((Date.now()-d.getTime())/1000);
    if(diff<60)return "الآن";
    if(diff<3600)return Math.floor(diff/60)+" دقيقة";
    if(diff<86400)return Math.floor(diff/3600)+" ساعة";
    return d.toLocaleDateString("ar-AE");
  }catch(e){return "";}
}

function mergeCustomUnits(data, y, m){
  // Ensure all active custom units exist in this month's data (and removed ones are gone)
  const cu=getCustomUnits();
  let changed=false;
  // Add active custom partition-units
  cu.units.forEach(u=>{
    const active=customUnitActiveIn(u,y,m);
    const existing=data.units.find(x=>x.id===u.id);
    if(active && !existing){
      const fresh=JSON.parse(JSON.stringify(u));
      delete fresh._fromY;delete fresh._fromM;delete fresh._removedY;delete fresh._removedM;
      fresh.partitions=(fresh.partitions||[]).map(p=>({...p,status:"vacant",tenant:"",note:"فارغ",partial:false,paid_amount:0,start_date:"",end_date:"",due_date:""}));
      data.units.push(fresh);changed=true;
    } else if(!active && existing){
      data.units=data.units.filter(x=>x.id!==u.id);changed=true;
    }
  });
  // Add active custom full-units
  cu.full.forEach(u=>{
    const active=customUnitActiveIn(u,y,m);
    const existing=data.full.find(x=>x.id===u.id);
    if(active && !existing){
      const fresh=JSON.parse(JSON.stringify(u));
      delete fresh._fromY;delete fresh._fromM;delete fresh._removedY;delete fresh._removedM;
      data.full.push(initFull(fresh));changed=true;
    } else if(!active && existing){
      data.full=data.full.filter(x=>x.id!==u.id);changed=true;
    }
  });
  return changed;
}

async function loadMonthOnline(y,m){
  const k=getMonthKey(y,m);
  const hasLocal=!!localStorage.getItem("qama_month_"+k);
  S.syncMsg="جاري المزامنة...";
  if(!hasLocal){S.loading=true;}
  R();
  try{
    const snap=await getDoc(doc(db,"months",k));
    if(snap.exists()){
      let data=normalizeData(snap.data().data||snap.data());
      if(isAprilMonth(y,m) && data.aprilSeedVersion!=="april-revenue-numbers-v1"){
        data=applyAprilImportedRevenue(data,true);
        await setDoc(doc(db,"months",k),{data,updatedAt:serverTimestamp()},{merge:true});
        S.syncMsg="تم تحميل إيرادات أبريل";
      }else if(isOldAutoFilledMonth(data)){
        data=createZeroMonthData(y,m);
        await setDoc(doc(db,"months",k),{data,updatedAt:serverTimestamp()},{merge:true});
        S.syncMsg=isAprilMonth(y,m)?"تم تحميل إيرادات أبريل":"بدأ الشهر من الصفر";
      }else{
        // Merge any custom units added later
        const merged=mergeCustomUnits(data,y,m);
        if(merged){
          await setDoc(doc(db,"months",k),{data,updatedAt:serverTimestamp()},{merge:true});
        }
        localStorage.setItem("qama_month_"+k,JSON.stringify(data));
        S.syncMsg="متصل";
      }
      // localStorage already set in each branch above
    }else{
      const data=normalizeData(createZeroMonthData(y,m));
      await setDoc(doc(db,"months",k),{data,updatedAt:serverTimestamp()},{merge:true});
      localStorage.setItem("qama_month_"+k,JSON.stringify(data));
      S.syncMsg=isAprilMonth(y,m)?"تم إنشاء أبريل مع الإيرادات":"تم إنشاء شهر جديد من الصفر";
    }
  }catch(e){
    console.error(e);
    S.syncMsg="تعذر الاتصال - حفظ محلي";
  }
  S.loading=false;
  R();
}

function saveMonthData(y,m,data,quiet=false){
  data=normalizeData(data);

    .catch(e=>{console.error(e);S.syncMsg="تعذر الحفظ أونلاين"; if(!quiet)R();});
}

async function verifyAndEnter(userKey,pin){
  let ok=false, offline=false;
  const res=await secureLogin(userKey,pin);
  if(res.ok){
    ok=true;
    try{localStorage.setItem("qama_ph_"+userKey,await pinHash(userKey,pin));}catch(e){}
  }else if(res.err==="auth/network-request-failed"){
    // لا إنترنت: تحقق من البصمة المشفّرة المحفوظة من آخر دخول ناجح
    try{
      const saved=localStorage.getItem("qama_ph_"+userKey);
      if(saved&&saved===await pinHash(userKey,pin)){ok=true;offline=true;}
      else if(!saved){S.pinMsg="لا اتصال — الدخول الأول يتطلب إنترنت";}
    }catch(e){}
  }else if(res.err==="auth/too-many-requests"){
    S.pinMsg="محاولات كثيرة — انتظر دقيقة ثم حاول";
  }
  S.pinBusy=false;
  // إذا رجع المستخدم للخلف أثناء التحقق لا تكمل الدخول
  if(S.screen!=="pin"||S.pendingUser!==userKey){S.pinMsg="";S.pin="";R();return;}
  if(!ok){
    S.pin="";S.pinErr=true;R();
    setTimeout(()=>{S.pinErr=false;S.pinMsg="";R();},1400);
    return;
  }
  S.pinMsg="";
  S.screen="app";S.user=userKey;S.pin="";S.pinErr=false;
  S.tab=(USERS[userKey].role==="owner"||userKey==="yahia")?"overview":"units";
  S.selUnit=null;S.editPart=null;
  if(offline)S.syncMsg="وضع محلي — لا اتصال";
  loadPermissions();
  loadLocksFromServer().then(()=>R()); // عند الدخول من Firebase + إعادة رسم
  loadRequests();
  loadCustomUnits();
  R();
  loadMonthOnline(S.year,S.month);
  loadBalances().then(()=>R());
}

function pinPress(d){
  if(S.pinBusy)return;
  if(S.pinErr){S.pin="";S.pinErr=false;S.pinMsg="";}
  const n=S.pin+d;
  if(n.length===PIN_LEN){
    S.pin=n;S.pinBusy=true;R();
    verifyAndEnter(S.pendingUser,n);
  } else set({pin:n});
}

// ========== DOM HELPER ==========
function h(tag,a,c){
  const e=document.createElement(tag);
  if(a)for(const[k,v]of Object.entries(a)){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class")e.className=v;
    else e.setAttribute(k,v);
  }
  for(const x of(c||[])){
    if(x==null||x===false)continue;
    e.appendChild(typeof x==="string"||typeof x==="number"?document.createTextNode(String(x)):x);
  }
  return e;
}

          return h("div",{style:{padding:"10px 14px",borderBottom:i<units.length-1?"1px solid #161616":"none",display:"flex",justifyContent:"space-between",alignItems:"center"}},[
            h("div",{},[
              h("div",{style:{fontSize:"13px",color:"#fff",fontWeight:"500"}},[u.name]),
              h("div",{style:{fontSize:"11px",color:"#555",marginTop:"2px"}},[occ+"/"+tot+" بارتشن"])]),
            h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},[
              h("div",{style:{background:"#1a1a1a",borderRadius:"3px",height:"5px",width:"80px",overflow:"hidden"}},[
                h("div",{style:{height:"100%",width:pct+"%",background:col,borderRadius:"3px"}})]),
              h("span",{style:{fontSize:"13px",fontWeight:"700",color:col,width:"36px",textAlign:"left"}},[pct+"%"])])]);})])]);
  }

  // ======= MAINTENANCE TAB =======
  if(S.tab==="maintenance"){
    const FACILITIES=["المصاعد","التكييف المركزي","الجنريتر","المواقف","المناطق المشتركة","أخرى"];
    const mData=getMonthData(S.year,S.month);
    const unitMaint=mData.unitMaintenance||[];
    const facMaint=mData.facilityMaintenance||[];

    // Add unit maintenance form
    let showAddUnitMaint=S.showAddUnitMaint||false;
    let showAddFacMaint=S.showAddFacMaint||false;

    const saveMaintenanceData=()=>{saveCurData(mData);showMsg("✓ تم الحفظ");};

    const unitMaintForm=showAddUnitMaint?h("div",{class:"card",style:{padding:"14px",marginBottom:"12px",border:"1px solid #2a2a2a"}},[
      h("div",{style:{fontSize:"13px",fontWeight:"600",color:"#fff",marginBottom:"10px"}},["صيانة شقة جديدة"]),
      (()=>{
        const fm={unitId:"",desc:"",amount:0,date:S.year+"-"+(S.month+1<10?"0"+(S.month+1):S.month+1)+"-01",contractor:""};
        const unitSel=h("select",{style:{marginBottom:"8px"}},
          [h("option",{value:""},"اختر الشقة"),...units.map(u=>h("option",{value:u.id},[u.name])),...full.map(u=>h("option",{value:"full_"+u.id},["شقة "+u.id+" (كاملة)"]))]);
        unitSel.addEventListener("change",e=>fm.unitId=e.target.value);
        const descInp=h("input",{type:"text",placeholder:"وصف الصيانة",style:{marginBottom:"8px"}});
        descInp.addEventListener("input",e=>fm.desc=e.target.value);
        const row=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}},[
          (()=>{const i=h("input",{type:"number",placeholder:"التكلفة"});i.addEventListener("input",e=>fm.amount=Number(e.target.value));return i;})(),
          (()=>{const i=h("input",{type:"text",placeholder:"المقاول/الشركة"});i.addEventListener("input",e=>fm.contractor=e.target.value);return i;})()]);
        const dateInp=h("input",{type:"date",value:fm.date,style:{marginBottom:"8px"}});
        dateInp.addEventListener("input",e=>fm.date=e.target.value);
        const btns=h("div",{style:{display:"flex",gap:"8px"}},[
          h("button",{class:"btn",style:{flex:"1",background:"#fff",color:"#000",borderRadius:"8px",padding:"9px",fontSize:"13px",fontWeight:"700"},
            onClick:()=>{
              if(!fm.unitId||!fm.desc)return showMsg("أدخل الشقة والوصف");
              if(!mData.unitMaintenance)mData.unitMaintenance=[];
              mData.unitMaintenance.push({...fm,id:Date.now()});
              saveMaintenanceData();set({showAddUnitMaint:false});
            }},["حفظ"]),
          h("button",{class:"btn",style:{flex:"1",background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#777",borderRadius:"8px",padding:"9px",fontSize:"13px"},
            onClick:()=>set({showAddUnitMaint:false})},["إلغاء"])]);
        return h("div",{},[unitSel,descInp,row,dateInp,btns]);
      })()]):null;

    const facMaintForm=showAddFacMaint?h("div",{class:"card",style:{padding:"14px",marginBottom:"12px",border:"1px solid #2a2a2a"}},[
      h("div",{style:{fontSize:"13px",fontWeight:"600",color:"#fff",marginBottom:"10px"}},["صيانة مرافق جديدة"]),
      (()=>{
        const fm={facility:"المصاعد",desc:"",amount:0,date:S.year+"-"+(S.month+1<10?"0"+(S.month+1):S.month+1)+"-01",contractor:""};
        const facSel=h("select",{style:{marginBottom:"8px"}},FACILITIES.map(f=>{const o=h("option",{value:f},[f]);if(f===fm.facility)o.selected=true;return o;}));
        facSel.addEventListener("change",e=>fm.facility=e.target.value);
        const descInp=h("input",{type:"text",placeholder:"وصف الصيانة",style:{marginBottom:"8px"}});
        descInp.addEventListener("input",e=>fm.desc=e.target.value);
        const row=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}},[
          (()=>{const i=h("input",{type:"number",placeholder:"التكلفة"});i.addEventListener("input",e=>fm.amount=Number(e.target.value));return i;})(),
          (()=>{const i=h("input",{type:"text",placeholder:"المقاول/الشركة"});i.addEventListener("input",e=>fm.contractor=e.target.value);return i;})()]);
        const dateInp=h("input",{type:"date",value:fm.date,style:{marginBottom:"8px"}});
        dateInp.addEventListener("input",e=>fm.date=e.target.value);
        const btns=h("div",{style:{display:"flex",gap:"8px"}},[
          h("button",{class:"btn",style:{flex:"1",background:"#fff",color:"#000",borderRadius:"8px",padding:"9px",fontSize:"13px",fontWeight:"700"},
            onClick:()=>{
              if(!fm.desc)return showMsg("أدخل وصف الصيانة");
              if(!mData.facilityMaintenance)mData.facilityMaintenance=[];
              mData.facilityMaintenance.push({...fm,id:Date.now()});
              saveMaintenanceData();set({showAddFacMaint:false});
            }},["حفظ"]),
          h("button",{class:"btn",style:{flex:"1",background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#777",borderRadius:"8px",padding:"9px",fontSize:"13px"},
            onClick:()=>set({showAddFacMaint:false})},["إلغاء"])]);
        return h("div",{},[facSel,descInp,row,dateInp,btns]);
      })()]):null;

    const totalUnitMaintCost=unitMaint.reduce((s,m)=>s+m.amount,0);
    const totalFacMaintCost=facMaint.reduce((s,m)=>s+m.amount,0);

    const unitCard=(m,i)=>{
      const unit=units.find(u=>u.id===m.unitId)||{name:m.unitId};
      return h("div",{class:"card",style:{padding:"12px",marginBottom:"8px"}},[
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},[
          h("div",{},[
            h("div",{style:{fontSize:"11px",color:"#60a5fa",marginBottom:"2px"}},[unit.name||m.unitId]),
            h("div",{style:{fontSize:"13px",color:"#fff",fontWeight:"500"}},[m.desc]),
            h("div",{style:{fontSize:"11px",color:"#555",marginTop:"2px"}},[m.date+(m.contractor?" · "+m.contractor:"")])]),
          h("div",{style:{fontSize:"14px",fontWeight:"700",color:"#f87171",flexShrink:"0"}},[m.amount>0?m.amount.toLocaleString()+" د.إ":"—"])])]);
    };

    const facCard=(m,i)=>h("div",{class:"card",style:{padding:"12px",marginBottom:"8px"}},[
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},[
        h("div",{},[
          h("div",{style:{fontSize:"11px",color:"#a78bfa",marginBottom:"2px"}},[m.facility]),
          h("div",{style:{fontSize:"13px",color:"#fff",fontWeight:"500"}},[m.desc]),
          h("div",{style:{fontSize:"11px",color:"#555",marginTop:"2px"}},[m.date+(m.contractor?" · "+m.contractor:"")])]),
        h("div",{style:{fontSize:"14px",fontWeight:"700",color:"#f87171",flexShrink:"0"}},[m.amount>0?m.amount.toLocaleString()+" د.إ":"—"])])]);

    content=h("div",{},[
      monthNav(),
      // Summary
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}},[
        h("div",{class:"card",style:{padding:"14px"}},[
          h("div",{style:{fontSize:"11px",color:"#555",marginBottom:"4px"}},["صيانة الشقق"]),
          h("div",{style:{fontSize:"20px",fontWeight:"900",color:"#f87171"}},[totalUnitMaintCost.toLocaleString()]),
          h("div",{style:{fontSize:"10px",color:"#444"}},["د.إ"])]),
        h("div",{class:"card",style:{padding:"14px"}},[
          h("div",{style:{fontSize:"11px",color:"#555",marginBottom:"4px"}},["صيانة المرافق"]),
          h("div",{style:{fontSize:"20px",fontWeight:"900",color:"#f87171"}},[totalFacMaintCost.toLocaleString()]),
          h("div",{style:{fontSize:"10px",color:"#444"}},["د.إ"])])]),

      // Unit maintenance section
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},[
        h("div",{style:{fontSize:"13px",fontWeight:"700",color:"#60a5fa"}},["🔧 صيانة الشقق"]),
        h("button",{class:"btn",style:{background:"#111",border:"1px solid #2a2a2a",color:"#888",borderRadius:"8px",padding:"5px 12px",fontSize:"12px"},
          onClick:()=>set({showAddUnitMaint:true})},["+ إضافة"])]),
      unitMaintForm,
      unitMaint.length>0?h("div",{},unitMaint.map(unitCard)):
        h("div",{style:{textAlign:"center",padding:"16px",color:"#555",fontSize:"12px"}},["لا توجد صيانة شقق هذا الشهر"]),

      // Facility maintenance section
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"16px 0 10px"}},[
        h("div",{style:{fontSize:"13px",fontWeight:"700",color:"#a78bfa"}},["⚙️ صيانة المرافق العامة"]),
        h("button",{class:"btn",style:{background:"#111",border:"1px solid #2a2a2a",color:"#888",borderRadius:"8px",padding:"5px 12px",fontSize:"12px"},
          onClick:()=>set({showAddFacMaint:true})},["+ إضافة"])]),
      facMaintForm,
      facMaint.length>0?h("div",{},facMaint.map(facCard)):
        h("div",{style:{textAlign:"center",padding:"16px",color:"#555",fontSize:"12px"}},["لا توجد صيانة مرافق هذا الشهر"])]);
  }

  // Build global alert bar
  const allLate=units.flatMap(u=>u.partitions.filter(p=>displayStatus&&displayStatus(p)==="late"||(!displayStatus&&p.status==="late")).map(p=>u.name+"/"+p.id));
  const allVacant=units.flatMap(u=>u.partitions.filter(p=>p.status==="vacant").map(p=>u.name+"/"+p.id));
  const alertStrip=(allLate.length>0||allVacant.length>0)?h("div",{style:{
    background:"#0a0a0a",
    borderBottom:"1px solid #1a1a1a",
    padding:"8px 14px",
    overflowX:"auto",
    WebkitOverflowScrolling:"touch",
    display:"flex",
    gap:"6px",
    alignItems:"center",
    flexWrap:"nowrap",
    scrollbarWidth:"none"
  }},[
    ...allLate.map(i=>{
      const parts=i.split("/");
      const unitName=parts[0];
      const partId=parseInt(parts[1]);
      const unit=units.find(u=>u.name===unitName);
      return h("span",{class:"btn",style:{
        background:"#450a0a",border:"1px solid #7f1d1d",
        color:"#fca5a5",borderRadius:"6px",
        padding:"3px 9px",fontSize:"11px",fontWeight:"600",
        flexShrink:"0",whiteSpace:"nowrap",cursor:"pointer"
      },onClick:()=>{
        if(unit)set({tab:"units",selUnit:unit.id,editPart:unit.id+"-"+partId});
      }},["⚠ "+i]);
    }),
    ...allVacant.map(i=>{
      const parts=i.split("/");
      const unitName=parts[0];
      const partId=parseInt(parts[1]);
      const unit=units.find(u=>u.name===unitName);
      return h("span",{class:"btn",style:{
        background:"#1c1917",border:"1px solid #44403c",
        color:"#a8a29e",borderRadius:"6px",
        padding:"3px 9px",fontSize:"11px",
        flexShrink:"0",whiteSpace:"nowrap",cursor:"pointer"
      },onClick:()=>{
        if(unit)set({tab:"units",selUnit:unit.id,editPart:unit.id+"-"+partId});
      }},["○ "+i]);
    })
  ]):null;
  return h("div",{},[hdr,alertStrip,h("div",{style:{padding:"14px 14px 48px"}},[content])]);
}

function R(){
  const root=document.getElementById("root");
  root.innerHTML="";
  if(S.screen==="home")root.appendChild(renderHome());
  else if(S.screen==="pin")root.appendChild(renderPin());
  else root.appendChild(renderApp());
}


window.addEventListener("DOMContentLoaded",R);
</script>
</body>
</html>
